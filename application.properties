# ============================================
# SERVER CONFIGURATION
# ============================================
spring.application.name=communication-service
server.port=8082
# ============================================
# DATABASE CONFIGURATION
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/video_voice_call_app
spring.datasource.username=root
spring.datasource.password=Nabdullah29_12
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# ============================================
# JPA/HIBERNATE CONFIGURATION
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
# File upload settings
voice.notes.upload-dir=./uploads/voice-notes
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# User service
user.service.url=http://localhost:8081
#  scheduling for public key refresh
spring.task.scheduling.enabled=true
# ============================================
# SWAGGER/OPENAPI DOCUMENTATION
# ============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
# ============================================
# ACTUATOR ENDPOINTS
# ============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
# ============================================
# REDIS CONFIGURATION
# ============================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000
spring.data.redis.connect-timeout=60000
# Optional ? if Redis requires auth:
# spring.data.redis.password=your_password
# ============================================
# WEBSOCKET CONFIGURATION
# ============================================
# STOMP endpoint mapping (used in WebSocketConfig)
websocket.endpoint=/ws
websocket.topic.prefix=/topic
websocket.app.prefix=/app
# ============================================
# APPLICATION CUSTOM SETTINGS
# ============================================
# Broadcast channel for presence notifications
presence.channel=user:presence
# ============================================
# CORS (if frontend or other services call it)
# ============================================
# Allow requests from Swing client or other services
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
# ============================================
# LOGGING CONFIGURATION
# ============================================
logging.level.com.videovoicecall.userservice=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
# LiveKit Configuration
livekit.api.key=devkey
livekit.api.secret=secret
livekit.ws.url=wss://localhost:7880
# JWT Configuration
jwt.secret=your_jwt_secret_key_change_this_in_production_minimum_256_bits
jwt.expiration=86400000
# Encryption Configuration
encryption.algorithm=AES
encryption.key=your_32_character_encryption_key
# ============================================
# CORS CONFIGURATION (NEW - ADD THIS)
# ============================================
cors.allowed.origins=http://localhost:3000,http://localhost:4200,http://localhost:5173,http://localhost:8080
cors.allowed.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowed.headers=*
cors.allow.credentials=true
cors.max.age=3600
# ============================================
# WEBSOCKET ALLOWED ORIGINS (NEW - ADD THIS)
# ============================================
websocket.allowed.origins=http://localhost:3000,http://localhost:4200,http://localhost:5173
